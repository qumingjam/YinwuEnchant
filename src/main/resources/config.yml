# =========================================
# YinwuEnchant 配置文件
# =========================================
# 插件版本: 1.1.1
# 附魔数量: 12个自定义附魔
#
# 附魔列表:
# 1. 猫爪 (cats_paw) - 击退周围苦力怕
# 2. 狗头 (nasus) - 击退周围骷髅类怪物
# 3. 切肉大师 (master_of_beef_slicing) - 击杀动物掉落更多肉类
# 4. 明目 (clearsight) - 免疫黑暗和失明效果
# 5. 黑暗行者 (darkspeed) - 在黑暗中获得速度加成
# 6. 共振 (resonate) - 盾牌格挡时反弹伤害
# 7. 外骨骼 (safefall) - 减少摔落伤害
# 8. 幽匿探测 (shrieker_sense) - 使用望远镜探测监守者和尖啸体
# 9. 音波爆裂 (sonic_boom) - 熄灭附近的灵魂营火和灵魂火
# 10. 深层矿工 (undermine) - 在地下低光照环境获得挖掘速度加成
# 11. 幻影守护者 (phantom) - 防止幻翼攻击
# 12. 丰收 (harvest) - 收获5x5x5范围的成熟作物（支持浆果丛，无需重新种植）
#
# =========================================
# 其他插件API调用方法
# =========================================
# 如果你的插件想要生成自定义附魔书并添加到战利品容器，可以使用以下API:
#
# 1. 获取插件实例:
#    Plugin yinwuPlugin = Bukkit.getPluginManager().getPlugin("YinwuEnchant");
#    if (yinwuPlugin instanceof YinwuEnchantments) {
#        YinwuEnchantments yinwu = (YinwuEnchantments) yinwuPlugin;
#        EnchantmentAcquisitionManager api = yinwu.getAcquisitionManager();
#    }
#
# 2. 创建附魔书:
#    ItemStack book = api.createEnchantedBook("cats_paw", 3);  // 创建猫爪 III
#
# 3. 获取所有附魔ID:
#    String[] ids = api.getAvailableEnchantmentIds();
#    // 返回: ["cats_paw", "nasus", "master_of_beef_slicing", "clearsight", "darkspeed", "resonate", "safefall", "shrieker_sense", "sonic_boom", "undermine", "phantom", "harvest"]
#
# 4. 获取附魔最大等级:
#    int maxLevel = api.getMaxLevel("cats_paw");  // 返回: 3
#
# 5. 添加到战利品容器:
#    chestInventory.addItem(book);
#
# 完整示例请查看插件文档或联系开发者
# =========================================

# 启用/禁用附魔
enchantments:
  clearsight:
    enabled: true
    # 检查间隔（刻），默认为20刻（1秒）
    check-interval: 20
  darkspeed:
    enabled: true
    # 黑暗判定光照等级（0-15）
    dark-light-level: 7
    # 速度加成（每级）
    speed-per-level: 0.1
    # 粒子效果间隔（刻）
    particle-interval: 10
    # 音效间隔（刻）
    sound-interval: 40
    # 粒子类型
    particle-type: SOUL_FIRE_FLAME
    # 音效类型
    sound-type: BLOCK_SOUL_SAND_STEP
  resonate:
    enabled: true
    # 伤害反弹比例（每级）
    damage-reflect-per-level: 0.2
    # 音效类型
    sound-type: ENTITY_IRON_GOLEM_HURT
  safefall:
    enabled: true
    # 每级减少的摔落伤害比例（0.0-1.0）
    damage-reduction-per-level: 0.3
    # 每级增加的安全掉落高度
    safe-fall-height-per-level: 2
  shrieker_sense:
    enabled: true
    # 高亮范围（方块）- 使用望远镜时的探测范围
    highlight-range: 48
    # 高亮颜色（RGB）
    highlight-color: '#00FF00'
    # 高亮持续时间（刻）- 60秒 = 1200刻
    highlight-duration: 1200
    # TextDisplay 位置偏移（相对于尖啸体方块）
    text-display-offset:
      x: 0.5
      y: 0.5
      z: 0.5
    # 冷却时间（秒）- 防止恶意触发
    cooldown: 10
  sonic_boom:
    enabled: true
    # 熄灭范围（方块）
    extinguish-range: 8
    # 检查间隔（刻）
    check-interval: 20
  undermine:
    enabled: true
    # 最大挖掘速度加成（倍率）
    max-efficiency-multiplier: 2.0
    # 每级增加的挖掘速度
    efficiency-per-level: 0.2
    # 触发条件：Y坐标上限
    trigger-y-max: 60
    # 触发条件：最大光照等级
    trigger-light-max: 7
    # 检查间隔（刻）
    check-interval: 10
  cats_paw:
    enabled: true
    # 检测范围（格）- 1级=5格，2级=7格，3级=9格
    range-level-1: 5
    range-level-2: 7
    range-level-3: 9
    # 检查间隔（刻）- 60刻=3秒
    check-interval: 60
  nasus:
    enabled: true
    # 检测范围（格）- 1级=10格，2级=12格，3级=16格
    range-level-1: 10
    range-level-2: 12
    range-level-3: 16
    # 检查间隔（刻）- 60刻=3秒
    check-interval: 60
  master_of_beef_slicing:
    enabled: true
    # 1级掉落数量范围
    drop-amount-level-1-min: 0
    drop-amount-level-1-max: 2
    # 2级掉落数量范围
    drop-amount-level-2-min: 1
    drop-amount-level-2-max: 4
    # 3级掉落数量范围
    drop-amount-level-3-min: 2
    drop-amount-level-3-max: 6
  phantom:
    enabled: true
  harvest:
    enabled: true
    # 收获范围（以目标方块为中心，各方向的格数）
    # range=2 表示 5x5x5 范围（中心±2格）
    # range=3 表示 7x7x7 范围（中心±3格）
    range: 2
    # 冷却时间（秒）
    cooldown: 3

# 附魔获取设置
acquisition:
  # 幻影守护者：幻翼掉落概率
  phantom-drop-chance: 0.05
  # 切肉大师：掠夺者/卫道士/唤魔者掉落概率
  beef-slicing-drop-chance: 0.03
  # 猫爪：猪灵掉落概率
  cats-paw-drop-chance: 0.02
  # 狗头：潜影贝掉落概率
  nasus-drop-chance: 0.015
  # 是否启用钓鱼获取丰收附魔
  fishing-harvest-enabled: true
  # 钓鱼时获得丰收附魔的概率（2%）
  harvest-fish-chance: 0.02

# 调试模式
debug: false